name: selftest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Syntax check
        run: bash -n backup.sh && bash -n restore.sh && bash -n selftest.sh

      - name: Run selftest
        run: bash selftest.sh
