# Rsync Backup - Global Configuration
# =====================================
# Machine-specific overrides (DST, LOG_FILE, etc.) go in .env — see .env.example

# Rsync base flags
RSYNC_FLAGS="--archive --verbose --human-readable --progress --partial"

# Delete files on destination that no longer exist on source (yes/no)
# When "yes", rsync uses --delete to create an exact mirror of the source
RSYNC_DELETE=yes
