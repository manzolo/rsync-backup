# Common paths - always included in every backup run
# ==================================================
# These paths are backed up regardless of plugin selection.
# Use this file for essential dotfiles and configs that
# don't fit into a specific plugin category.

PATH $HOME/.bashrc
PATH $HOME/.profile
PATH $HOME/.gitconfig
PATH $HOME/.config/htop
PATH $HOME/.config/user-dirs.dirs
PATH $HOME/.config/user-dirs.locale
PATH $HOME/.local/share/applications
EXCLUDE *.bak
