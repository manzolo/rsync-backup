# APT - Manually installed packages list
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD apt-mark showmanual > $HOME/.local/share/package-lists/apt-manual.txt

PATH $HOME/.local/share/package-lists/apt-manual.txt

PATH /usr/share/keyrings

PATH /etc/apt/sources.list.d

PATH /etc/apt/keyrings

PATH /etc/apt/trusted.gpg.d

RESTORE_CMD bash -c 'sudo apt-get update; avail=(); skip=(); while IFS= read -r p; do [[ -z "$p" ]] && continue; if apt-cache policy "$p" 2>/dev/null | grep -qE "https?://|ftp://"; then avail+=("$p"); else skip+=("$p"); fi; done < "$HOME/.local/share/package-lists/apt-manual.txt"; [ ${#avail[@]} -gt 0 ] && sudo apt-get install -y "${avail[@]}"; [ ${#skip[@]} -gt 0 ] && printf "\n\033[1;33mInstallare manualmente (non trovati nei repo):\033[0m\n" && printf "  - %s\n" "${skip[@]}"'
