# APT - Manually installed packages list
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD apt-mark showmanual > $HOME/.local/share/package-lists/apt-manual.txt

PATH $HOME/.local/share/package-lists/apt-manual.txt

PATH /usr/share/keyrings

PATH /etc/apt/sources.list.d

PATH /etc/apt/keyrings

PATH /etc/apt/trusted.gpg.d

RESTORE_CMD sudo apt-get update && xargs -a $HOME/.local/share/package-lists/apt-manual.txt sudo apt-get install -y
