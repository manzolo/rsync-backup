# Packages - Installed packages list snapshot
# Generates package lists before backup, then backs them up
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD dpkg --get-selections > $HOME/.local/share/package-lists/dpkg-selections.txt
PRE_CMD apt-mark showmanual > $HOME/.local/share/package-lists/apt-manual.txt
PRE_CMD snap list > $HOME/.local/share/package-lists/snap-list.txt 2>/dev/null || true
PRE_CMD flatpak list > $HOME/.local/share/package-lists/flatpak-list.txt 2>/dev/null || true

PATH $HOME/.local/share/package-lists
