# Virt-Manager - Virtual machine configurations and storage pools
ENABLED=yes

PATH $HOME/.config/libvirt
PATH /etc/libvirt
EXCLUDE qemu/save/
PATH /var/lib/libvirt/images
PATH /var/lib/libvirt/qemu/nvram
PATH $HOME/Workspaces/qemu/storage/hd
PATH $HOME/Workspaces/qemu/storage/Iso
PATH $HOME/Workspaces/qemu/storage/floppy
PATH $HOME/Workspaces/qemu/storage/shared
