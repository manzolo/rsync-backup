# System - Full /etc configuration
ENABLED=yes

PATH /etc
EXCLUDE shadow
EXCLUDE shadow-
EXCLUDE gshadow
EXCLUDE gshadow-
RESTORE_EXCLUDE fstab
RESTORE_EXCLUDE crypttab
RESTORE_EXCLUDE hostname
RESTORE_EXCLUDE machine-id
RESTORE_EXCLUDE ssh/ssh_host_*
RESTORE_EXCLUDE netplan/
RESTORE_EXCLUDE NetworkManager/system-connections/

PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Ripristina /etc/fstab? (UUIDs partizioni - solo stessa macchina) [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo cp "$DST/etc/fstab" /etc/fstab || true; else echo "  (--yes: /etc/fstab non ripristinato - verificare manualmente)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Ripristina /etc/crypttab? (UUIDs volumi cifrati) [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo cp "$DST/etc/crypttab" /etc/crypttab || true; else echo "  (--yes: /etc/crypttab non ripristinato)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Ripristina /etc/hostname? [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo cp "$DST/etc/hostname" /etc/hostname || true; else echo "  (--yes: /etc/hostname non ripristinato)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Ripristina /etc/machine-id? [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo cp "$DST/etc/machine-id" /etc/machine-id || true; else echo "  (--yes: /etc/machine-id non ripristinato)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Ripristina chiavi SSH host (/etc/ssh/ssh_host_*)? [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo rsync -a --include="ssh_host_*" --exclude="*" "$DST/etc/ssh/" /etc/ssh/ || true; else echo "  (--yes: chiavi SSH host non ripristinate)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Ripristina /etc/netplan/? (config rete hardware) [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo rsync -a "$DST/etc/netplan/" /etc/netplan/ || true; else echo "  (--yes: /etc/netplan/ non ripristinato)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Ripristina connessioni NetworkManager? [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo rsync -a "$DST/etc/NetworkManager/system-connections/" /etc/NetworkManager/system-connections/ || true; else echo "  (--yes: connessioni NM non ripristinate)"; fi
