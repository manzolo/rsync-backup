# System - Full /etc configuration
ENABLED=yes

PATH /etc
EXCLUDE shadow
EXCLUDE shadow-
EXCLUDE gshadow
EXCLUDE gshadow-
RESTORE_EXCLUDE fstab
RESTORE_EXCLUDE crypttab
RESTORE_EXCLUDE hostname
RESTORE_EXCLUDE machine-id
RESTORE_EXCLUDE ssh/ssh_host_*
RESTORE_EXCLUDE netplan/
RESTORE_EXCLUDE NetworkManager/system-connections/

PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Restore /etc/fstab? (partition UUIDs - only safe on same hardware) [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo cp "$DST/etc/fstab" /etc/fstab || true; else echo "  (--yes: /etc/fstab not restored - verify manually)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Restore /etc/crypttab? (encrypted volume UUIDs) [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo cp "$DST/etc/crypttab" /etc/crypttab || true; else echo "  (--yes: /etc/crypttab not restored)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Restore /etc/hostname? [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo cp "$DST/etc/hostname" /etc/hostname || true; else echo "  (--yes: /etc/hostname not restored)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Restore /etc/machine-id? [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo cp "$DST/etc/machine-id" /etc/machine-id || true; else echo "  (--yes: /etc/machine-id not restored)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Restore SSH host keys (/etc/ssh/ssh_host_*)? [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo rsync -a --include="ssh_host_*" --exclude="*" "$DST/etc/ssh/" /etc/ssh/ || true; else echo "  (--yes: SSH host keys not restored)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Restore /etc/netplan/? (hardware network config) [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo rsync -a "$DST/etc/netplan/" /etc/netplan/ || true; else echo "  (--yes: /etc/netplan/ not restored)"; fi
PRE_RESTORE_CMD if [[ "$SKIP_CONFIRM" != true ]]; then read -rp "  Restore NetworkManager connections? [y/N] " _a; [[ "$_a" =~ ^[Yy]$ ]] && sudo rsync -a "$DST/etc/NetworkManager/system-connections/" /etc/NetworkManager/system-connections/ || true; else echo "  (--yes: NetworkManager connections not restored)"; fi
