# Flatpak - Installed Flatpak applications list
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD flatpak list --app --columns=application:f 2>/dev/null > $HOME/.local/share/package-lists/flatpak-list.txt || true

PATH $HOME/.local/share/package-lists/flatpak-list.txt

RESTORE_CMD flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo || true
RESTORE_CMD xargs -a $HOME/.local/share/package-lists/flatpak-list.txt -I{} flatpak install -y flathub {}
