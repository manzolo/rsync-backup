# Dotconfig - Catch-all for ~/.config (apps not covered by specific plugins)
ENABLED=yes

PATH $HOME/.config
# Already covered by dedicated plugins
EXCLUDE Code/
EXCLUDE dconf/
EXCLUDE filezilla/
EXCLUDE geany/
EXCLUDE htop/
EXCLUDE libvirt/
EXCLUDE rclone/
EXCLUDE remmina/
EXCLUDE autostart/
EXCLUDE Google/
# Browser profiles (large, ephemeral - create dedicated plugins if needed)
EXCLUDE google-chrome/
EXCLUDE BraveSoftware/
EXCLUDE chromium/
EXCLUDE microsoft-edge/
EXCLUDE vivaldi/
# Very large / regenerable
EXCLUDE retroarch/
EXCLUDE Antigravity/
# Runtime and session data
EXCLUDE pulse/
EXCLUDE session/
EXCLUDE glib-2.0/
EXCLUDE ibus/
EXCLUDE update-notifier/
EXCLUDE procps/
EXCLUDE gnome-session/
