# Dotconfig - Catch-all for ~/.config (apps not covered by specific plugins)
ENABLED=yes

PATH $HOME/.config
# Already covered by dedicated plugins
EXCLUDE Code/
EXCLUDE dconf/
EXCLUDE filezilla/
EXCLUDE geany/
EXCLUDE htop/
EXCLUDE libvirt/
EXCLUDE rclone/
EXCLUDE remmina/
EXCLUDE autostart/
EXCLUDE Google/
EXCLUDE obs-studio/
EXCLUDE evolution/
EXCLUDE scummvm/
EXCLUDE Nextcloud/
EXCLUDE qBittorrent/
EXCLUDE vlc/
EXCLUDE audacity/
EXCLUDE dosbox-x/
EXCLUDE org.coolercontrol.coolercontrol/
# Browser profiles (large, ephemeral - create dedicated plugins if needed)
EXCLUDE google-chrome/
EXCLUDE BraveSoftware/
EXCLUDE chromium/
EXCLUDE microsoft-edge/
EXCLUDE vivaldi/
# Runtime and session data
EXCLUDE pulse/
EXCLUDE session/
EXCLUDE glib-2.0/
EXCLUDE ibus/
EXCLUDE update-notifier/
EXCLUDE procps/
EXCLUDE gnome-session/
