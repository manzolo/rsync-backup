# Dotlocal - Catch-all for ~/.local/share (apps not covered by specific plugins)
ENABLED=yes

PATH $HOME/.local/share
# Already covered by dedicated plugins
EXCLUDE keyrings/
EXCLUDE gnome-shell/
EXCLUDE applications/
EXCLUDE package-lists/
EXCLUDE remmina/
EXCLUDE whisper/
# Very large / regenerable
EXCLUDE 86Box/
EXCLUDE suyu/
EXCLUDE claude/
EXCLUDE qBittorrent/
EXCLUDE JetBrains/
EXCLUDE virtualenv/
EXCLUDE Trash/
# Runtime / ephemeral
EXCLUDE gvfs-metadata/
EXCLUDE gnome-settings-daemon/
EXCLUDE gstreamer-1.0/
EXCLUDE xorg/
EXCLUDE RecentDocuments/
