# Dotlocal - Catch-all for ~/.local (bin, lib, coda, share)
ENABLED=yes

PATH $HOME/.local/bin

PATH $HOME/.local/lib

PATH $HOME/.local/coda

PATH $HOME/.local/share
# Already covered by dedicated plugins
EXCLUDE 86Box/
EXCLUDE suyu/
EXCLUDE keyrings/
EXCLUDE gnome-shell/
EXCLUDE applications/
EXCLUDE package-lists/
EXCLUDE remmina/
EXCLUDE whisper/
# Regenerable
EXCLUDE virtualenv/
EXCLUDE Trash/
EXCLUDE containers/
# Runtime / ephemeral
EXCLUDE gvfs-metadata/
EXCLUDE gnome-settings-daemon/
EXCLUDE gstreamer-1.0/
EXCLUDE xorg/
EXCLUDE RecentDocuments/
