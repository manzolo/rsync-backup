# GNOME - Desktop settings, extensions and shell data
ENABLED=yes

PRE_CMD dconf dump / > $HOME/.config/dconf/dconf-dump.txt 2>/dev/null || true

PATH $HOME/.config/dconf
PATH $HOME/.local/share/gnome-shell/extensions
PATH $HOME/.local/share/gnome-shell
EXCLUDE gnome-shell-notifications
PATH $HOME/.config/autostart

RESTORE_CMD dconf load / < $HOME/.config/dconf/dconf-dump.txt 2>/dev/null || true
