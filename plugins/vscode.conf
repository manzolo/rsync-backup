# VS Code - Editor settings, keybindings, snippets and extensions list
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD code --list-extensions > $HOME/.local/share/package-lists/vscode-extensions.txt 2>/dev/null || true

PATH $HOME/.config/Code/User
EXCLUDE globalStorage/
EXCLUDE workspaceStorage/
EXCLUDE History/

PATH $HOME/.local/share/package-lists/vscode-extensions.txt

RESTORE_CMD [ -s $HOME/.local/share/package-lists/vscode-extensions.txt ] && xargs -a $HOME/.local/share/package-lists/vscode-extensions.txt -I{} code --install-extension {} --force 2>/dev/null || true
