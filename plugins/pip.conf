# Pip - User-installed Python packages (pip3)
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD pip3 list --user --format=freeze 2>/dev/null > $HOME/.local/share/package-lists/pip-requirements.txt || true

PATH $HOME/.local/share/package-lists/pip-requirements.txt

RESTORE_CMD pip3 install --user -r $HOME/.local/share/package-lists/pip-requirements.txt
