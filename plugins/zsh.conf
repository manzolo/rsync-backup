# Zsh - Zsh config, Oh My Zsh custom plugins and themes
ENABLED=yes

PATH $HOME/.zshrc

PATH $HOME/.p10k.zsh

PATH $HOME/.oh-my-zsh
EXCLUDE example
EXCLUDE example.zsh-theme

RESTORE_CMD [ -d $HOME/.oh-my-zsh ] || sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
