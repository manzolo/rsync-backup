# Snap - Installed snap packages list
# Note: classic snaps may need --classic and must be reinstalled manually
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD snap list 2>/dev/null | awk 'NR>1 {print $1}' > $HOME/.local/share/package-lists/snap-list.txt || true

PATH $HOME/.local/share/package-lists/snap-list.txt

RESTORE_CMD xargs -a $HOME/.local/share/package-lists/snap-list.txt -I{} sudo snap install {}
