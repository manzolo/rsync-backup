# Snap - Installed snap packages list (ordered: bases → apps → classic)
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD LANG=C snap list 2>/dev/null | awk 'NR>1 && ($NF=="base" || $NF=="core" || $NF=="snapd") {print $1}' > $HOME/.local/share/package-lists/snap-base.txt || true
PRE_CMD LANG=C snap list 2>/dev/null | awk 'NR>1 && $NF=="-"       {print $1}' > $HOME/.local/share/package-lists/snap-list.txt || true
PRE_CMD LANG=C snap list 2>/dev/null | awk 'NR>1 && $NF=="classic" {print $1}' > $HOME/.local/share/package-lists/snap-classic.txt || true

PATH $HOME/.local/share/package-lists/snap-base.txt

PATH $HOME/.local/share/package-lists/snap-list.txt

PATH $HOME/.local/share/package-lists/snap-classic.txt

RESTORE_CMD bash -c 'f="$HOME/.local/share/package-lists/snap-base.txt"; [ -s "$f" ] || exit 0; echo "Installing base snaps..."; while IFS= read -r p; do sudo snap install "$p" 2>/dev/null || true; done < "$f"'
RESTORE_CMD bash -c 'f="$HOME/.local/share/package-lists/snap-list.txt"; [ -s "$f" ] || exit 0; failed=(); while IFS= read -r p; do sudo snap install "$p" 2>/dev/null || failed+=("$p"); done < "$f"; [ ${#failed[@]} -eq 0 ] && exit 0; echo "Retrying ${#failed[@]} failed snap(s)..."; for p in "${failed[@]}"; do sudo snap install "$p" || echo "  FAILED: $p"; done'
RESTORE_CMD bash -c 'f="$HOME/.local/share/package-lists/snap-classic.txt"; [ -s "$f" ] || exit 0; failed=(); while IFS= read -r p; do sudo snap install --classic "$p" 2>/dev/null || failed+=("$p"); done < "$f"; [ ${#failed[@]} -eq 0 ] && exit 0; echo "Retrying ${#failed[@]} failed classic snap(s)..."; for p in "${failed[@]}"; do sudo snap install --classic "$p" || echo "  FAILED: $p"; done'
