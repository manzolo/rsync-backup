# Snap - Installed snap packages list
ENABLED=yes

PRE_CMD mkdir -p $HOME/.local/share/package-lists
PRE_CMD LANG=C snap list 2>/dev/null | awk 'NR>1 && $NF=="-"       {print $1}' > $HOME/.local/share/package-lists/snap-list.txt || true
PRE_CMD LANG=C snap list 2>/dev/null | awk 'NR>1 && $NF=="classic" {print $1}' > $HOME/.local/share/package-lists/snap-classic.txt || true

PATH $HOME/.local/share/package-lists/snap-list.txt

PATH $HOME/.local/share/package-lists/snap-classic.txt

RESTORE_CMD [ -s $HOME/.local/share/package-lists/snap-list.txt ]    && xargs -a $HOME/.local/share/package-lists/snap-list.txt    -I{} sudo snap install {}          || true
RESTORE_CMD [ -s $HOME/.local/share/package-lists/snap-classic.txt ] && xargs -a $HOME/.local/share/package-lists/snap-classic.txt -I{} sudo snap install --classic {} || true
